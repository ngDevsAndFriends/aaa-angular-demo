<table class="table">
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Date</th>
      <th scope="col">Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (task of tasks(); track task.id) {
      <tr>
        <td>{{ task.title }}</td>
        <td>{{ task.createdAt | date }}</td>
        <td>
          <a class="btn btn-primary" [routerLink]="['/update', task.id]">Update</a>
        </td>
      </tr>
    }
  </tbody>
</table>
