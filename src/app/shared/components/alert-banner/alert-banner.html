<div
  role="alert"
  class="alert alert-vertical alert-info alert-soft"
  [class.alert-info]="type() ? type() === 'info' : false"
  [class.alert-error]="type() ? type() === 'error' : false"
>
  <span>{{ message() }}</span>
  <div class="flex gap-2">
    <button class="btn btn-sm">Deny</button>
    <button class="btn btn-sm btn-primary">Accept</button>
  </div>
</div>
